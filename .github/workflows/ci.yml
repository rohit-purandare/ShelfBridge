# Continuous Integration
# Tests, linting, and Docker builds for pull requests and feature branches
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Run tests across multiple Node.js versions
  test:
    name: Test (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1 # Shallow clone for CI performance

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # Build Docker image for testing (PRs and feature branches)
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      actions: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1 # Shallow clone for CI performance

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push test image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          load: true
          tags: |
            ghcr.io/rohit-purandare/shelfbridge:test
            ghcr.io/rohit-purandare/shelfbridge:pr-${{ github.event.number }}
            ghcr.io/rohit-purandare/shelfbridge:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Test Docker image
        env:
          TEST_IMAGE: ghcr.io/rohit-purandare/shelfbridge:${{ github.sha }}
        run: |
          echo "Testing Docker image functionality..."

          # Basic runtime test
          docker run --rm --entrypoint="" "$TEST_IMAGE" node --version

          # Check main entry point exists
          docker run --rm --entrypoint="" "$TEST_IMAGE" ls src/main.js

          # Quick smoke test of application
          docker run --rm --entrypoint="" "$TEST_IMAGE" node -e "console.log('Docker build test passed')"

          echo "✅ Docker image test completed successfully"

      - name: Display test image info
        run: |
          echo "🐳 Test images published:"
          echo "  - ghcr.io/rohit-purandare/shelfbridge:pr-${{ github.event.number }}"
          echo "  - ghcr.io/rohit-purandare/shelfbridge:${{ github.sha }}"
          echo ""
          echo "📋 Usage:"
          echo "  docker pull ghcr.io/rohit-purandare/shelfbridge:pr-${{ github.event.number }}"
          echo "  docker run ghcr.io/rohit-purandare/shelfbridge:pr-${{ github.event.number }}"
