# Release Management
# Automated versioning, changelog generation, and Docker image publishing
name: Release

on:
  push:
    branches: [main]

jobs:
  # Release Please handles versioning and changelog generation
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Full history for semantic versioning

      - name: Validate Release Please token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_PLEASE_TOKEN" ]; then
            echo "::error::Set RELEASE_PLEASE_TOKEN to a PAT or GitHub App token so Release Please PRs can trigger required checks."
            exit 1
          fi

      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build and publish Docker images when a release is created
  docker-publish:
    name: Build & Publish Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 1 # Shallow clone for performance

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/shelfbridge
          tags: |
            # Semantic versioning using release-please outputs
            type=semver,pattern=v{{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern=v{{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern=v{{major}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.tag_name }}
            # Latest tag for releases
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=ShelfBridge
            org.opencontainers.image.description=Personal book collection management system
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build and push multi-arch Docker image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Generate attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/shelfbridge
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Verify published images
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/shelfbridge
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          run_native_test() {
            local platform="$1"
            local platform_digest="$2"

            echo "🧪 Testing native module on $platform..."
            docker run --rm --pull=always --platform "$platform" --entrypoint="" \
              "$IMAGE@$platform_digest" npm run test:native
          }

          echo "🔍 Verifying multi-architecture manifest..."
          manifest=$(docker buildx imagetools inspect --raw "$IMAGE@$DIGEST")
          platforms=$(jq -r '.manifests[] | select(.platform.os != "unknown") | "\(.platform.os)/\(.platform.architecture)"' <<< "$manifest")
          echo "$platforms"
          grep -qx 'linux/amd64' <<< "$platforms"
          grep -qx 'linux/arm64' <<< "$platforms"

          amd64_digest=$(jq -er '[.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64")][0].digest' <<< "$manifest")
          arm64_digest=$(jq -er '[.manifests[] | select(.platform.os == "linux" and .platform.architecture == "arm64")][0].digest' <<< "$manifest")

          # Each architecture must use its child-manifest digest. Reusing the
          # multi-arch index digest makes Docker reject the second platform with
          # "cannot overwrite digest" after the first platform is pulled.
          run_native_test linux/amd64 "$amd64_digest"
          run_native_test linux/arm64 "$arm64_digest"

          echo "✅ Multi-architecture image verified"

  # Post-release notification
  release-notification:
    name: Release Notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [release-please, docker-publish]
    if: needs.release-please.outputs.release_created == 'true'
    permissions: {}

    steps:
      - name: Display release summary
        run: |
          echo "🎉 Release ${{ needs.release-please.outputs.tag_name }} Published Successfully!"
          echo ""
          echo "📋 Release Details:"
          echo "  • Version: ${{ needs.release-please.outputs.version }}"
          echo "  • Tag: ${{ needs.release-please.outputs.tag_name }}"
          echo "  • Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.release-please.outputs.tag_name }}"
          echo ""
          echo "🐳 Docker Images Published:"
          echo "  • Image Digest: ${{ needs.docker-publish.outputs.digest }}"
          echo "  • Generated Tags:"
          echo "${{ needs.docker-publish.outputs.tags }}" | sed 's/^/    • /'
          echo ""
          echo "🏗️ Multi-architecture support: linux/amd64, linux/arm64"
          echo ""
          echo "📦 Usage:"
          echo "  docker pull ghcr.io/${{ github.repository_owner }}/shelfbridge:latest"
          echo "  docker pull ghcr.io/${{ github.repository_owner }}/shelfbridge:${{ needs.release-please.outputs.version }}"
