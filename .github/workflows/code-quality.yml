# Code Quality
# Static analysis, linting, and configuration validation
name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Gitleaks scans repository history

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Validate configuration
        run: |
          if [ -f "config/config.yaml.example" ]; then
            node -e "
              const yaml = require('js-yaml');
              const fs = require('fs');
              yaml.load(fs.readFileSync('config/config.yaml.example', 'utf8'));
              console.log('✅ Configuration example is valid');
            "
          else
            echo "❌ config/config.yaml.example not found"
            exit 1
          fi

      - name: Check for issues
        run: |
          echo "🔍 Checking for common issues..."

          # Debug statements
          if grep -r "console\.debug\|console\.trace\|debugger" src/ > /dev/null 2>&1; then
            echo "⚠️ Debug statements found - consider removing before production"
            grep -r "console\.debug\|console\.trace\|debugger" src/ || true
          fi

          echo "✅ Code quality checks passed"
